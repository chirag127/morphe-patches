name: Generate release keystore

# Manual one-shot workflow to generate a signing keystore for the fleet.
# Run once, capture the printed passwords into GH Secrets, then delete the
# workflow run (which auto-purges the artifact after 1 day anyway).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gen-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate random passwords
        id: pass
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)
          KEY_PASS=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Generate keystore
        env:
          STORE_PASS: ${{ steps.pass.outputs.store_pass }}
          KEY_PASS: ${{ steps.pass.outputs.key_pass }}
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -keyalg RSA \
            -keysize 4096 \
            -validity 36500 \
            -alias morphe \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname 'CN=chirag127-morphe, O=chirag127, C=IN'
          base64 -w 0 release.jks > release.jks.b64

      - name: Print passwords (masked in logs — copy from workflow summary)
        env:
          STORE_PASS: ${{ steps.pass.outputs.store_pass }}
          KEY_PASS: ${{ steps.pass.outputs.key_pass }}
        run: |
          {
            echo "## Keystore generated"
            echo ""
            echo "Copy these into GH Secrets on chirag127/morphe-patches:"
            echo ""
            echo "- \`KEYSTORE_B64\` = artifact content (release.jks.b64)"
            echo "- \`KEYSTORE_STORE_PASS\` = \`$STORE_PASS\`"
            echo "- \`KEYSTORE_KEY_PASS\` = \`$KEY_PASS\`"
            echo "- \`KEYSTORE_ALIAS\` = \`morphe\`"
            echo ""
            echo "Then delete this workflow run to purge the artifact early."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: release.jks.b64
          retention-days: 1
          if-no-files-found: error
